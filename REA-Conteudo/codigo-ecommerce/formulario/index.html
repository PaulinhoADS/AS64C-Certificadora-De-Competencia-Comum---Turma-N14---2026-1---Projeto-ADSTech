<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
    <div class="header-container">
        <nav>
        <ul class="nav-menu">
          <li class="nav-item"><a href="../vitrine/" class="nav-link">Produtos</a>
          <li class="nav-item"><a href="#" class="nav-link">Cadastrar Produtos</a>
          <li class="nav-item"><a href="../carrinho/" class="nav-link">Carrinho</a>
          </li>
            </ul>
        </nav>
      <div class="header-actions">
        <a href="../carrinho/" class="icon-btn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-count">0</span></a>
      </div>
      <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
    </div>
    </header>

    <main>
        <div class="form-container">
            <h1>Cadastrar Novo Produto</h1>

            <form onsubmit="salvarProduto(event)" class="form-produto">
                <div class="input-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="input-group">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" name="preco" step="0.01" required>
                </div>

                <div class="input-group">
                    <label for="foto">URL da Imagem</label>
                    <input type="url" id="foto" name="foto" required>
                </div>

                <div class="input-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Salvar Produto</button>
            </form>
        </div>
    </main>
    
    <div class="toast">Produto salvo com sucesso!</div>
    
    <footer>
        <p>&copy; 2026 | E-commerce</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
