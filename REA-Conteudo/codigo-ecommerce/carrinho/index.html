<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Meu e-Commerce</div>
        <nav>
            <ul>
                <li><a href="../vitrine/">Vitrine</a></li>
                <li><a href="../formulario/">Cadastrar Produto</a></li>
                <li><a href="#">Carrinho</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="carrinho-container">
            <h1>Seu Carrinho</h1>
            
            <div class="itens-carrinho" id="listaCarrinho">
                
                <div id="mensagemVazia" class="carrinho-vazio">
                    <p>🛒 Você ainda não adicionou nenhum produto ao carrinho.</p>
                    <a href="../vitrine/" class="btn-voltar">Ir para a Vitrine</a>
                </div>

            </div>

            <div class="resumo-carrinho" id="resumoCarrinho">
                <h2>Total: <span id="valorTotal">R$ 0,00</span></h2>
                <button class="btn-finalizar">Finalizar Compra</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Meu e-Commerce. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
